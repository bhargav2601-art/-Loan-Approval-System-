{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center py-10">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-3xl p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-primary">Welcome Back</h2>
                <p class="text-gray-600 mt-2">Login to manage your loan applications</p>
            </div>
            
            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" name="email" required class="w-full pl-12 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-accent transition-all" placeholder="john@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" required class="w-full pl-12 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-accent transition-all" placeholder="••••••••">
                    </div>
                </div>
                
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center space-x-2 text-gray-600 cursor-pointer">
                        <input type="checkbox" class="rounded border-gray-300 text-accent focus:ring-accent">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="text-accent font-semibold hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="w-full gradient-button text-white py-4 rounded-xl font-bold text-lg mt-4">
                    Sign In
                </button>
            </form>
            
            <p class="text-center text-sm text-gray-600 mt-8">
                Don't have an account? <a href="/" class="text-accent font-bold hover:underline">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
