<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLoan AI | AI-Powered Loan Decision Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a',
                        accent: '#3b82f6',
                        glass: 'rgba(255, 255, 255, 0.7)',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .gradient-button {
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .gradient-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">

    <!-- NAVIGATION -->
    <nav class="sticky top-0 z-50 glass-card px-6 py-4 flex justify-between items-center mb-8">
        <div class="flex items-center space-x-2">
            <div class="bg-accent p-2 rounded-lg text-white">
                <i class="fas fa-hand-holding-dollar text-xl"></i>
            </div>
            <span class="text-xl font-bold text-primary">SmartLoan AI</span>
        </div>
        
        <div class="hidden md:flex items-center space-x-6">
            {% if session.get('user_id') %}
                <a href="/dashboard" class="text-gray-600 hover:text-accent font-medium transition-colors">Dashboard</a>
                <a href="/apply" class="text-gray-600 hover:text-accent font-medium transition-colors">Apply Now</a>
                <a href="/history" class="text-gray-600 hover:text-accent font-medium transition-colors">My Applications</a>
                <a href="/logout" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-medium hover:bg-red-100 transition-colors">Logout</a>
            {% else %}
                <a href="/login" class="text-gray-600 hover:text-accent font-medium transition-colors">Login</a>
                <a href="/" class="gradient-button text-white px-6 py-2 rounded-lg font-medium">Get Started</a>
            {% endif %}
        </div>
    </nav>

    <main class="container mx-auto px-4 pb-20">
        {% block content %}{% endblock %}
    </main>

    <!-- CHATBOT -->
    {% if session.get('user_id') %}
    <div id="chatbot" class="fixed bottom-6 right-6 z-50">
        <button onclick="toggleChat()" class="bg-accent w-14 h-14 rounded-full text-white shadow-lg flex items-center justify-center hover:scale-110 transition-transform">
            <i class="fas fa-robot text-2xl"></i>
        </button>
        
        <div id="chat-window" class="hidden absolute bottom-20 right-0 w-80 h-96 glass-card rounded-2xl flex flex-col shadow-2xl overflow-hidden">
            <div class="bg-primary p-4 text-white flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-robot"></i>
                    <span class="font-bold">AI Assistant</span>
                </div>
                <button onclick="toggleChat()" class="hover:text-gray-300"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4">
                <div class="bg-gray-100 p-3 rounded-2xl rounded-tl-none text-sm text-gray-800">
                    Hi! I'm your SmartLoan AI assistant. How can I help you today?
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-100">
                <div class="flex space-x-2">
                    <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-accent">
                    <button onclick="sendMessage()" class="bg-accent text-white px-4 py-2 rounded-lg"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
    {% endif %}

    <script>
        function toggleChat() {
            const window = document.getElementById('chat-window');
            window.classList.toggle('hidden');
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const messages = document.getElementById('chat-messages');
            const msg = input.value.trim();
            
            if (!msg) return;

            // Add user message
            messages.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-accent text-white p-3 rounded-2xl rounded-tr-none text-sm">
                        ${msg}
                    </div>
                </div>
            `;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await response.json();
                
                // Add AI response
                messages.innerHTML += `
                    <div class="bg-gray-100 p-3 rounded-2xl rounded-tl-none text-sm text-gray-800">
                        ${data.response}
                    </div>
                `;
                messages.scrollTop = messages.scrollHeight;
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
