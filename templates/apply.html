{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto py-10">
    <div id="form-container" class="glass-card rounded-3xl p-8 md:p-12">
        <div class="mb-10">
            <h2 class="text-3xl font-bold text-primary">Loan Application</h2>
            <p class="text-gray-600 mt-2">Fill in your details for an instant AI-powered decision.</p>
        </div>

        <form id="loan-form" action="/submit" method="POST" onsubmit="showLoading()" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- AGE -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Age</label>
                    <input type="number" name="age" required min="18" max="100" class="w-full px-4 py-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-accent transition-all text-lg" placeholder="e.g. 30">
                </div>
                
                <!-- INCOME -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Annual Income ($)</label>
                    <input type="number" name="income" required class="w-full px-4 py-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-accent transition-all text-lg" placeholder="e.g. 50000">
                </div>

                <!-- LOAN AMOUNT -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Loan Amount Requested ($)</label>
                    <input type="number" name="loan" required class="w-full px-4 py-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-accent transition-all text-lg" placeholder="e.g. 25000">
                </div>

                <!-- CREDIT SCORE -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Credit Score</label>
                    <input type="number" name="score" required min="300" max="900" class="w-full px-4 py-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-accent transition-all text-lg" placeholder="e.g. 720">
                </div>

                <!-- PROPERTY -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-3 uppercase tracking-wide">Do you own any property?</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer group">
                            <input type="radio" name="property" value="1" required class="hidden peer">
                            <div class="p-4 text-center rounded-xl border-2 border-gray-100 bg-gray-50 peer-checked:border-accent peer-checked:bg-blue-50 group-hover:bg-gray-100 transition-all">
                                <i class="fas fa-home mb-2 text-xl block text-gray-400 peer-checked:text-accent"></i>
                                <span class="font-bold text-gray-600 peer-checked:text-accent">Yes, I own property</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="property" value="0" class="hidden peer">
                            <div class="p-4 text-center rounded-xl border-2 border-gray-100 bg-gray-50 peer-checked:border-accent peer-checked:bg-blue-50 group-hover:bg-gray-100 transition-all">
                                <i class="fas fa-building mb-2 text-xl block text-gray-400 peer-checked:text-accent"></i>
                                <span class="font-bold text-gray-600 peer-checked:text-accent">No property</span>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full gradient-button text-white py-5 rounded-2xl font-bold text-xl mt-6 shadow-lg shadow-blue-200 flex items-center justify-center space-x-3">
                <span>Analyze Application</span>
                <i class="fas fa-microchip"></i>
            </button>
        </form>
    </div>

    <!-- LOADING SCREEN -->
    <div id="loading-screen" class="hidden flex flex-col items-center justify-center py-20 space-y-8">
        <div class="relative w-24 h-24">
            <div class="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-accent rounded-full border-t-transparent animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i class="fas fa-brain text-accent text-3xl"></i>
            </div>
        </div>
        <div class="text-center">
            <h3 class="text-2xl font-bold text-primary">AI is analyzing your profile...</h3>
            <p class="text-gray-500 mt-2">Calculating risk scores and verifying data points.</p>
        </div>
        <div class="w-64 h-2 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full bg-accent animate-[loading_2s_ease-in-out_infinite]" style="width: 40%"></div>
        </div>
    </div>
</div>

<style>
    @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
    }
</style>

<script>
    function showLoading() {
        document.getElementById('form-container').classList.add('hidden');
        document.getElementById('loading-screen').classList.remove('hidden');
    }
</script>
{% endblock %}
